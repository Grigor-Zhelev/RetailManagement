<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Retail Management</title>
  <style>
    body { font-family: Segoe UI, sans-serif; margin: 20px; background: #f5f5f5; }
    h2 { margin-bottom: 10px; }
    label { display: inline-block; width: 80px; }
    input, select, textarea { width: 250px; margin: 3px 0; padding: 4px; }
    button { margin: 4px 2px; padding: 6px 14px; cursor: pointer; }
    #productList { width: 350px; height: 200px; }
    .row { margin-bottom: 6px; }
    #status { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>

<h2>Retail Management — Central</h2>

<div class="row">
  <label>Store:</label>
  <select id="storeFilter" onchange="loadProducts()">
    <option value="">All Stores</option>
    <option value="11111111-1111-1111-1111-111111111111">Billa Lyulin</option>
    <option value="22222222-2222-2222-2222-222222222222">Billa Dianabad</option>
    <option value="33333333-3333-3333-3333-333333333333">Billa Bukston</option>
  </select>
</div>

<div class="row">
  <select id="productList" size="10" style="width:350px" onchange="onSelect()"></select>
</div>

<div class="row"><label>Name:</label>       <input id="fName" /></div>
<div class="row"><label>Description:</label><textarea id="fDesc" rows="2"></textarea></div>
<div class="row"><label>Price:</label>      <input id="fPrice" type="number" step="0.01" /></div>
<div class="row"><label>Min Price:</label>  <input id="fMinPrice" type="number" step="0.01" /></div>
<div class="row">
  <label>Store:</label>
  <select id="fStore">
    <option value="11111111-1111-1111-1111-111111111111">Billa Lyulin</option>
    <option value="22222222-2222-2222-2222-222222222222">Billa Dianabad</option>
    <option value="33333333-3333-3333-3333-333333333333">Billa Bukston</option>
  </select>
</div>

<div>
  <button onclick="addProduct()">Add</button>
  <button onclick="updateProduct()">Update</button>
  <button onclick="deleteProduct()">Delete</button>
  <button onclick="clearForm()">Clear</button>
</div>

<div id="status"></div>

<script>
  const API = 'http://localhost:5001/api/products';

  const stores = {
    '11111111-1111-1111-1111-111111111111': 'Billa Lyulin',
    '22222222-2222-2222-2222-222222222222': 'Billa Dianabad',
    '33333333-3333-3333-3333-333333333333': 'Billa Bukston',
  };

  let allProducts = [];
  let selectedId  = null;

  async function loadProducts() {
    const storeId = document.getElementById('storeFilter').value;
    const url     = storeId ? `${API}/store/${storeId}` : API;
    try {
      const res   = await fetch(url);
      allProducts = await res.json();
      renderList();
    } catch {
      setStatus('Cannot connect to API', true);
    }
  }

  function renderList() {
    const list = document.getElementById('productList');
    list.innerHTML = '';
    allProducts.forEach(p => {
      const option = document.createElement('option');
      option.value = p.id;
      option.text  = `${p.name} — ${stores[p.storeId] || p.storeName} — ${p.price} лв.`;
      list.appendChild(option);
    });
  }

  function onSelect() {
    selectedId    = document.getElementById('productList').value;
    const product = allProducts.find(p => p.id === selectedId);
    if (!product) return;
    document.getElementById('fName').value     = product.name;
    document.getElementById('fDesc').value     = product.description;
    document.getElementById('fPrice').value    = product.price;
    document.getElementById('fMinPrice').value = product.minPrice;
    document.getElementById('fStore').value    = product.storeId;
  }

  async function addProduct() {
    const body = getFormData();
    if (!body) return;
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    setStatus(res.ok ? 'Added ✓' : 'Error', !res.ok);
    if (res.ok) { clearForm(); loadProducts(); }
  }

  async function updateProduct() {
    if (!selectedId) return setStatus('Select a product first', true);
    const body = getFormData();
    if (!body) return;
    const res = await fetch(`${API}/${selectedId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    setStatus(res.ok ? 'Updated ✓' : 'Error', !res.ok);
    if (res.ok) loadProducts();
  }

  async function deleteProduct() {
    if (!selectedId) return setStatus('Select a product first', true);
    if (!confirm('Delete?')) return;
    const res = await fetch(`${API}/${selectedId}`, { method: 'DELETE' });
    setStatus(res.ok || res.status === 204 ? 'Deleted ✓' : 'Error', !res.ok);
    if (res.ok || res.status === 204) { clearForm(); loadProducts(); }
  }

  function getFormData() {
    const name  = document.getElementById('fName').value.trim();
    const price = parseFloat(document.getElementById('fPrice').value);
    if (!name)        return setStatus('Name is required', true), null;
    if (isNaN(price)) return setStatus('Price is required', true), null;
    const storeId = document.getElementById('fStore').value;
    return {
      name,
      description: document.getElementById('fDesc').value.trim(),
      price,
      minPrice: parseFloat(document.getElementById('fMinPrice').value) || 0,
      storeId,
      storeName: stores[storeId]
    };
  }

  function clearForm() {
    selectedId = null;
    ['fName','fDesc','fPrice','fMinPrice'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fStore').value = '11111111-1111-1111-1111-111111111111';
    setStatus('');
  }

  function setStatus(msg, isError = false) {
    const el   = document.getElementById('status');
    el.textContent = msg;
    el.style.color = isError ? 'red' : 'green';
  }

  loadProducts();
</script>
</body>
</html>
